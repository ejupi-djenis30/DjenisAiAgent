services:
  # ---------------------------------------------------------------------------
  # Main agent service (web mode — no Windows UI automation in containers)
  # ---------------------------------------------------------------------------
  djenis-agent:
    build:
      context: .
      dockerfile: Dockerfile
      target: runtime
    image: djenis-ai-agent:latest
    container_name: djenis-agent
    init: true
    restart: unless-stopped
    read_only: true
    cap_drop:
      - ALL
    security_opt:
      - no-new-privileges:true
    pids_limit: 256
    stop_grace_period: 30s
    ports:
      - "127.0.0.1:8008:8000"
    environment:
      # Required secrets — set in .env file or pass via environment
      GEMINI_API_KEY: ${GEMINI_API_KEY:?Set GEMINI_API_KEY in .env}
      DJENIS_WEB_AUTH_TOKEN: ${DJENIS_WEB_AUTH_TOKEN:?Set DJENIS_WEB_AUTH_TOKEN in .env}

      # Agent behaviour
      DJENIS_MAX_LOOP_TURNS: ${DJENIS_MAX_LOOP_TURNS:-50}
      DJENIS_ACTION_TIMEOUT: ${DJENIS_ACTION_TIMEOUT:-45}
      DJENIS_GEMINI_MODEL: ${DJENIS_GEMINI_MODEL:-gemini-3.5-flash}
      DJENIS_RUNTIME_MODE: docker
      DJENIS_PERMISSION_TIER: ${DJENIS_PERMISSION_TIER:-interact}

      # Logging
      DJENIS_LOG_LEVEL: ${DJENIS_LOG_LEVEL:-INFO}
      DJENIS_VERBOSE_LOGGING: ${DJENIS_VERBOSE_LOGGING:-false}

      # Streaming
      DJENIS_STREAM_MAX_FPS: ${DJENIS_STREAM_MAX_FPS:-15}
      DJENIS_STREAM_FRAME_QUALITY: ${DJENIS_STREAM_FRAME_QUALITY:-80}
      DJENIS_WEB_MAX_CONNECTIONS: ${DJENIS_WEB_MAX_CONNECTIONS:-8}
      DJENIS_WEB_STREAM_MAX_CLIENTS: ${DJENIS_WEB_STREAM_MAX_CLIENTS:-2}

      # Selenium remote — connect to the dedicated chrome service below
      SELENIUM_REMOTE_URL: http://chrome:4444/wd/hub

    volumes:
      - agent-logs:/app/logs
    tmpfs:
      - /tmp:size=64m,noexec,nosuid,nodev
    depends_on:
      chrome:
        condition: service_healthy
    healthcheck:
      test:
        [
          "CMD",
          "python",
          "-c",
          "import urllib.request; urllib.request.urlopen('http://localhost:8000/health', timeout=5).read()",
        ]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 15s
    networks:
      - djenis-net

  # ---------------------------------------------------------------------------
  # Selenium standalone Chrome (headless browser automation)
  # ---------------------------------------------------------------------------
  chrome:
    image: selenium/standalone-chromium:4.46.0-20260707@sha256:3400b92f1cddb2dfaaf358654e8f7d83d7be45192fb73c5f28c25faa28d36504
    container_name: djenis-chrome
    restart: unless-stopped
    shm_size: 2g
    environment:
      SE_NODE_MAX_SESSIONS: 1
      SE_NODE_OVERRIDE_MAX_SESSIONS: "false"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:4444/wd/hub/status"]
      interval: 15s
      timeout: 10s
      retries: 5
      start_period: 10s
    networks:
      - djenis-net

volumes:
  agent-logs:
    driver: local

networks:
  djenis-net:
    driver: bridge
