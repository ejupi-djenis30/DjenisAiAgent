name: Docker Publish

on:
  push:
    branches: [master]
    tags: ["v*"]
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: djenis-ai-agent

jobs:
  verify:
    name: Release Quality Gate
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - name: Checkout repository
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Set up Python
        uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1 # v6.3.0
        with:
          python-version: "3.12"

      - name: Set up uv
        uses: astral-sh/setup-uv@11f9893b081a58869d3b5fccaea48c9e9e46f990 # v8.3.2
        with:
          version: "0.11.29"
          cache-dependency-glob: uv.lock

      - name: Install release verification dependencies
        run: uv sync --frozen --extra dev --extra web --extra browser --extra transcription

      - name: Verify source and locked runtime
        run: |
          uv lock --check
          uv pip compile requirements-docker.txt \
            --output-file requirements-docker.lock \
            --generate-hashes \
            --python-version 3.12 \
            --python-platform linux
          git diff --exit-code -- requirements-docker.lock
          uv run --frozen --no-sync ruff check src tests scripts main.py
          uv run --frozen --no-sync ruff format --check src tests scripts main.py
          uv run --frozen --no-sync mypy src scripts
          uv run --frozen --no-sync pytest \
            tests/unit/test_config.py \
            tests/unit/test_exceptions.py \
            tests/unit/test_gemini_core.py \
            tests/unit/test_audio_transcription.py \
            tests/unit/test_browser_tools.py \
            tests/unit/test_permissions.py \
            tests/unit/test_project_site.py \
            tests/unit/test_redaction.py \
            tests/unit/test_web_security.py
          uv run --frozen --no-sync pip-audit --progress-spinner off --disable-pip -r requirements-docker.lock

  publish:
    name: Build and Push GHCR Image
    runs-on: ubuntu-latest
    needs: verify
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Normalize owner name
        id: owner
        shell: bash
        run: echo "value=${GITHUB_REPOSITORY_OWNER,,}" >> "$GITHUB_OUTPUT"

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@bb05f3f5519dd87d3ba754cc423b652a5edd6d2c # v4.2.0

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@af1e73f918a031802d376d3c8bbc3fe56130a9b0 # v4.4.0
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract Docker metadata
        id: meta
        uses: docker/metadata-action@dc802804100637a589fabce1cb79ff13a1411302 # v6.2.0
        with:
          images: ${{ env.REGISTRY }}/${{ steps.owner.outputs.value }}/${{ env.IMAGE_NAME }}
          tags: |
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=semver,pattern={{major}}
            type=raw,value=latest,enable=${{ github.ref == 'refs/heads/master' }}
            type=sha,prefix=sha-,enable=${{ github.ref == 'refs/heads/master' }}
          labels: |
            org.opencontainers.image.source=https://github.com/${{ github.repository }}
            org.opencontainers.image.revision=${{ github.sha }}

      - name: Build and push Docker image
        id: build
        uses: docker/build-push-action@53b7df96c91f9c12dcc8a07bcb9ccacbed38856a # v7.3.0
        with:
          context: .
          file: Dockerfile
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          provenance: mode=max
          sbom: true

      - name: Scan published image
        uses: aquasecurity/trivy-action@ed142fd0673e97e23eac54620cfb913e5ce36c25 # v0.36.0
        with:
          image-ref: ${{ env.REGISTRY }}/${{ steps.owner.outputs.value }}/${{ env.IMAGE_NAME }}@${{ steps.build.outputs.digest }}
          format: table
          exit-code: '1'
          ignore-unfixed: true
          vuln-type: os,library
          severity: CRITICAL,HIGH

      - name: Print published image metadata
        shell: bash
        run: |
          echo "Image: ${{ env.REGISTRY }}/${{ steps.owner.outputs.value }}/${{ env.IMAGE_NAME }}"
          echo "Digest: ${{ steps.build.outputs.digest }}"
          echo "Tags:"
          echo "${{ steps.meta.outputs.tags }}"

  release:
    name: Create GitHub Release
    runs-on: ubuntu-latest
    needs: publish
    if: startsWith(github.ref, 'refs/tags/v')
    permissions:
      contents: write

    steps:
      - name: Normalize owner name
        id: owner
        shell: bash
        run: echo "value=${GITHUB_REPOSITORY_OWNER,,}" >> "$GITHUB_OUTPUT"

      - name: Create release notes
        uses: softprops/action-gh-release@3d0d9888cb7fd7b750713d6e236d1fcb99157228 # v3.0.2
        with:
          generate_release_notes: true
          body: |
            ## Docker Image

            Pull the tagged image from GitHub Container Registry:

            ```bash
            docker pull ghcr.io/${{ steps.owner.outputs.value }}/djenis-ai-agent:${{ github.ref_name }}
            ```

            Run the published image:

            ```bash
            docker run --rm -p 8000:8000 -e GEMINI_API_KEY=your_key \
              ghcr.io/${{ steps.owner.outputs.value }}/djenis-ai-agent:${{ github.ref_name }}
            ```

            For Docker Compose, native Windows mode, and CI details, see the repository README.
