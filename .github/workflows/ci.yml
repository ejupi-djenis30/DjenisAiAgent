name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

env:
  PYTHON_DEFAULT: "3.12"

jobs:
  # ---------------------------------------------------------------------------
  # Linting — ruff check + format check
  # ---------------------------------------------------------------------------
  lint:
    name: Lint (ruff)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_DEFAULT }}

      - name: Cache pip
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: lint-${{ runner.os }}-pip-${{ hashFiles('pyproject.toml') }}
          restore-keys: lint-${{ runner.os }}-pip-

      - name: Install ruff
        run: pip install "ruff>=0.4.0"

      - name: Check linting
        run: ruff check src/ main.py

      - name: Check formatting
        run: ruff format --check src/ main.py

  # ---------------------------------------------------------------------------
  # Type checking — mypy
  # ---------------------------------------------------------------------------
  type-check:
    name: Type Check (mypy)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_DEFAULT }}
          cache: pip

      - name: Install mypy + stubs
        run: pip install "mypy>=1.10.0" types-Pillow python-dotenv

      - name: Run mypy
        run: mypy src/ --ignore-missing-imports --no-strict-optional

  # ---------------------------------------------------------------------------
  # Unit tests — matrix across Python versions
  # ---------------------------------------------------------------------------
  test:
    name: Tests (Python ${{ matrix.python-version }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.11", "3.12"]

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip

      - name: Install test dependencies
        run: |
          pip install --upgrade pip
          pip install google-generativeai Pillow python-dotenv fastapi uvicorn \
                      "pytest>=8.2" pytest-asyncio pytest-cov pydantic

      - name: Run unit tests with coverage
        # GEMINI_API_KEY is intentionally not set here — unit tests use mocks
        run: |
          pytest tests/unit/ -m "not integration" \
            --cov=src --cov-report=xml --cov-report=term-missing \
            -q

      - name: Upload coverage to Codecov
        if: matrix.python-version == env.PYTHON_DEFAULT
        uses: codecov/codecov-action@v4
        with:
          files: coverage.xml
          fail_ci_if_error: false

  # ---------------------------------------------------------------------------
  # Docker build validation
  # ---------------------------------------------------------------------------
  docker-build:
    name: Docker Build
    runs-on: ubuntu-latest
    needs: [lint, test]

    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Cache Docker layers
        uses: actions/cache@v4
        with:
          path: /tmp/.buildx-cache
          key: buildx-${{ runner.os }}-${{ hashFiles('Dockerfile', 'requirements-docker.txt') }}
          restore-keys: buildx-${{ runner.os }}-

      - name: Build Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: Dockerfile
          push: false
          tags: djenis-ai-agent:ci-${{ github.sha }}
          cache-from: type=local,src=/tmp/.buildx-cache
          cache-to: type=local,dest=/tmp/.buildx-cache-new,mode=max

      # Prevent unbounded cache growth
      - name: Move cache
        run: |
          rm -rf /tmp/.buildx-cache
          mv /tmp/.buildx-cache-new /tmp/.buildx-cache

      - name: Smoke test — container starts and /health responds
        run: |
          docker run -d --name djenis-smoke \
            -p 8000:8000 \
            -e GEMINI_API_KEY=placeholder_for_smoke_test \
            djenis-ai-agent:ci-${{ github.sha }}

          # Wait for the container to be ready
          for i in $(seq 1 15); do
            if curl -sf http://localhost:8000/health; then
              echo "Health check passed"
              break
            fi
            echo "Attempt $i/15 — waiting..."
            sleep 2
          done

          docker stop djenis-smoke
          docker rm djenis-smoke
