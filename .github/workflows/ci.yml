name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  PYTHON_DEFAULT: "3.12"
  FORCE_COLOR: "1"
  PIP_DISABLE_PIP_VERSION_CHECK: "1"
  PYTHONUTF8: "1"

jobs:
  lint:
    name: Lint (ruff)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_DEFAULT }}
          cache: pip
          cache-dependency-path: |
            pyproject.toml
            requirements.txt
            requirements-docker.txt

      - name: Install lint dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e ".[dev]"

      - name: Run ruff checks
        run: |
          ruff check src tests main.py
          ruff format --check src tests main.py

  security:
    name: Security Scan
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_DEFAULT }}
          cache: pip
          cache-dependency-path: |
            pyproject.toml
            requirements.txt

      - name: Install security dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e ".[dev]"

      - name: Run Bandit
        run: bandit -r src -f json -o bandit-report.json

      - name: Run dependency audit
        run: pip-audit --progress-spinner off

      - name: Upload security report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: security-reports
          path: bandit-report.json
          if-no-files-found: error

  type-check:
    name: Type Check (mypy)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_DEFAULT }}
          cache: pip
          cache-dependency-path: |
            pyproject.toml
            requirements.txt

      - name: Install type-check dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e ".[dev,web,browser,transcription]"

      - name: Run mypy
        run: mypy src/

  portable-tests:
    name: Portable Unit Tests (Python ${{ matrix.python-version }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.11", "3.12"]

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip
          cache-dependency-path: |
            pyproject.toml
            requirements.txt

      - name: Install portable test dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e ".[dev,web,browser,transcription]"

      - name: Run portable unit suite
        run: |
          pytest \
            tests/unit/test_config.py \
            tests/unit/test_exceptions.py \
            tests/unit/test_gemini_core.py \
            tests/unit/test_audio_transcription.py \
            tests/unit/test_browser_tools.py \
            --junitxml=pytest-portable.xml

      - name: Upload portable test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: portable-test-results-${{ matrix.python-version }}
          path: pytest-portable.xml
          if-no-files-found: error

  windows-coverage:
    name: Windows Coverage Gate
    runs-on: windows-latest
    needs: [lint, type-check, security]

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_DEFAULT }}
          cache: pip
          cache-dependency-path: |
            pyproject.toml
            requirements.txt

      - name: Install full test dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e ".[dev,windows,web,browser,transcription]"

      - name: Run full unit suite with coverage
        shell: bash
        run: |
          pytest tests/unit \
            --cov=src \
            --cov-report=term-missing \
            --cov-report=xml \
            --cov-report=html \
            --junitxml=pytest-windows.xml
          python -m coverage report > coverage-summary.txt

      - name: Upload coverage artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: windows-coverage-report
          path: |
            coverage.xml
            coverage-summary.txt
            pytest-windows.xml
            htmlcov/
          if-no-files-found: error

      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@v5
        with:
          files: coverage.xml
          flags: windows-unit
          fail_ci_if_error: false

  docker-build:
    name: Docker Build + Smoke Test
    runs-on: ubuntu-latest
    needs: [portable-tests, windows-coverage]

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build Docker image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: Dockerfile
          load: true
          push: false
          tags: djenis-ai-agent:ci-${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Smoke test container health endpoint
        shell: bash
        run: |
          cleanup() {
            docker logs djenis-smoke || true
            docker rm -f djenis-smoke || true
          }
          trap cleanup EXIT

          docker run -d \
            --name djenis-smoke \
            -p 8000:8000 \
            -e GEMINI_API_KEY=placeholder_for_smoke_test \
            djenis-ai-agent:ci-${{ github.sha }}

          for attempt in $(seq 1 20); do
            if curl -fsS http://localhost:8000/health; then
              echo "Health check passed"
              exit 0
            fi
            echo "Attempt ${attempt}/20: waiting for /health..."
            sleep 2
          done

          echo "Container failed to become healthy in time"
          exit 1

      - name: Scan image with Trivy
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: djenis-ai-agent:ci-${{ github.sha }}
          format: table
          exit-code: '1'
          ignore-unfixed: true
          vuln-type: os,library
          severity: CRITICAL,HIGH
