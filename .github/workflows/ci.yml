name: CI

"on":
  push:
    branches: [master]
  pull_request:
    branches: [master]
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  PYTHON_DEFAULT: "3.12"
  FORCE_COLOR: "1"
  PIP_DISABLE_PIP_VERSION_CHECK: "1"
  PYTHONUTF8: "1"

jobs:
  lint:
    name: Lint (ruff)
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Checkout repository
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false

      - name: Set up Python
        uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1 # v6.3.0
        with:
          python-version: ${{ env.PYTHON_DEFAULT }}

      - name: Set up uv
        uses: astral-sh/setup-uv@11f9893b081a58869d3b5fccaea48c9e9e46f990 # v8.3.2
        with:
          version: "0.11.29"
          cache-dependency-glob: uv.lock

      - name: Install lint dependencies
        run: uv sync --frozen --extra dev

      - name: Install actionlint
        id: install-actionlint
        shell: bash
        env:
          ACTIONLINT_SHA256: 8aca8db96f1b94770f1b0d72b6dddcb1ebb8123cb3712530b08cc387b349a3d8
          ACTIONLINT_VERSION: 1.7.12
        run: |
          archive="actionlint_${ACTIONLINT_VERSION}_linux_amd64.tar.gz"
          curl --fail --location --silent --show-error \
            --output "${archive}" \
            "https://github.com/rhysd/actionlint/releases/download/v${ACTIONLINT_VERSION}/${archive}"
          echo "${ACTIONLINT_SHA256}  ${archive}" | sha256sum --check
          tar --extract --gzip --file "${archive}" actionlint
          install -m 0755 actionlint "${RUNNER_TEMP}/actionlint"

      - name: Validate GitHub Actions workflows
        id: actionlint
        shell: bash
        run: '"${RUNNER_TEMP}/actionlint"'

      - name: Run ruff checks
        run: |
          uv run --frozen --no-sync ruff check src tests scripts main.py
          uv run --frozen --no-sync ruff format --check src tests scripts main.py

      - name: Validate release contract
        run: uv run --frozen --no-sync python scripts/validate_release.py

  security:
    name: Security Scan
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Checkout repository
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false

      - name: Set up Python
        uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1 # v6.3.0
        with:
          python-version: ${{ env.PYTHON_DEFAULT }}

      - name: Set up uv
        uses: astral-sh/setup-uv@11f9893b081a58869d3b5fccaea48c9e9e46f990 # v8.3.2
        with:
          version: "0.11.29"
          cache-dependency-glob: uv.lock

      - name: Install security dependencies
        run: uv sync --frozen --extra dev

      - name: Run Bandit
        run: uv run --frozen --no-sync bandit -r src scripts main.py -f json -o bandit-report.json

      - name: Run dependency audit
        run: |
          uv lock --check
          uv pip compile requirements-docker.txt \
            --output-file requirements-docker.lock \
            --generate-hashes \
            --python-version 3.12 \
            --python-platform linux
          git diff --exit-code -- requirements-docker.lock
          uv run --frozen --no-sync pip-audit --progress-spinner off
          uv run --frozen --no-sync pip-audit --progress-spinner off --disable-pip -r requirements-docker.lock

      - name: Upload security report
        if: always()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: security-reports
          path: bandit-report.json
          if-no-files-found: error

  type-check:
    name: Type Check (mypy)
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Checkout repository
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false

      - name: Set up Python
        uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1 # v6.3.0
        with:
          python-version: ${{ env.PYTHON_DEFAULT }}

      - name: Set up uv
        uses: astral-sh/setup-uv@11f9893b081a58869d3b5fccaea48c9e9e46f990 # v8.3.2
        with:
          version: "0.11.29"
          cache-dependency-glob: uv.lock

      - name: Install type-check dependencies
        run: uv sync --frozen --extra dev --extra web --extra browser --extra transcription

      - name: Run mypy
        run: uv run --frozen --no-sync mypy src/ scripts/

  portable-tests:
    name: Portable Unit Tests (Python ${{ matrix.python-version }})
    runs-on: ubuntu-latest
    permissions:
      contents: read
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.11", "3.12"]

    steps:
      - name: Checkout repository
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1 # v6.3.0
        with:
          python-version: ${{ matrix.python-version }}

      - name: Set up uv
        uses: astral-sh/setup-uv@11f9893b081a58869d3b5fccaea48c9e9e46f990 # v8.3.2
        with:
          version: "0.11.29"
          cache-dependency-glob: uv.lock

      - name: Install portable test dependencies
        run: uv sync --frozen --extra dev --extra web --extra browser --extra transcription

      - name: Run portable unit suite
        run: |
          uv run --frozen --no-sync pytest \
            tests/unit/test_config.py \
            tests/unit/test_exceptions.py \
            tests/unit/test_gemini_core.py \
            tests/unit/test_audio_transcription.py \
            tests/unit/test_browser_tools.py \
            tests/unit/test_permissions.py \
            tests/unit/test_privileged_tools.py \
            tests/unit/test_project_site.py \
            tests/unit/test_release_contract.py \
            tests/unit/test_release_registry.py \
            tests/unit/test_github_release.py \
            tests/unit/test_redaction.py \
            tests/unit/test_web_security.py \
            --junitxml=pytest-portable.xml

      - name: Upload portable test results
        if: always()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: portable-test-results-${{ matrix.python-version }}
          path: pytest-portable.xml
          if-no-files-found: error

  windows-coverage:
    name: Windows Coverage Gate
    runs-on: windows-latest
    permissions:
      contents: read
    needs: [lint, type-check, security]

    steps:
      - name: Checkout repository
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false

      - name: Set up Python
        uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1 # v6.3.0
        with:
          python-version: ${{ env.PYTHON_DEFAULT }}

      - name: Set up uv
        uses: astral-sh/setup-uv@11f9893b081a58869d3b5fccaea48c9e9e46f990 # v8.3.2
        with:
          version: "0.11.29"
          cache-dependency-glob: uv.lock

      - name: Install full test dependencies
        run: uv sync --frozen --extra dev --extra windows --extra web --extra browser --extra transcription

      - name: Run full unit suite with coverage
        id: coverage-gate
        shell: bash
        run: |
          uv run --frozen --no-sync pytest tests/unit \
            --cov=src \
            --cov-report=term-missing \
            --cov-report=xml \
            --cov-report=html \
            --junitxml=pytest-windows.xml
          uv run --frozen --no-sync coverage report > coverage-summary.txt

      - name: Upload coverage artifacts
        id: coverage-artifact
        if: always()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: windows-coverage-report
          path: |
            coverage.xml
            coverage-summary.txt
            pytest-windows.xml
            htmlcov/
          if-no-files-found: error

  docker-build:
    name: Docker Build + Smoke Test
    runs-on: ubuntu-latest
    permissions:
      contents: read
    needs: [portable-tests, windows-coverage]

    steps:
      - name: Checkout repository
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@bb05f3f5519dd87d3ba754cc423b652a5edd6d2c # v4.2.0

      - name: Build Docker image
        uses: docker/build-push-action@53b7df96c91f9c12dcc8a07bcb9ccacbed38856a # v7.3.0
        with:
          context: .
          file: Dockerfile
          load: true
          push: false
          tags: djenis-ai-agent:ci-${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Smoke test container HTTP and WebSocket contracts
        shell: bash
        run: |
          cleanup() {
            docker logs djenis-smoke || true
            docker rm -f djenis-smoke || true
          }
          trap cleanup EXIT
          smoke_token="test_operator_token_for_ci_only_12345"

          docker run -d \
            --name djenis-smoke \
            -p 8000:8000 \
            -e GEMINI_API_KEY=placeholder_for_smoke_test \
            -e DJENIS_WEB_AUTH_TOKEN="${smoke_token}" \
            djenis-ai-agent:ci-${{ github.sha }}

          healthy=false
          for attempt in $(seq 1 20); do
            if curl -fsS http://localhost:8000/health; then
              echo "Health check passed"
              healthy=true
              break
            fi
            echo "Attempt ${attempt}/20: waiting for /health..."
            sleep 2
          done

          if [[ "${healthy}" != "true" ]]; then
            echo "Container failed to become healthy in time"
            exit 1
          fi

          docker exec -i \
            -e DJENIS_SMOKE_AUTH_TOKEN="${smoke_token}" \
            djenis-smoke python - <<'PYTHON'
          import asyncio
          import json
          import os
          from http.cookies import SimpleCookie
          from urllib.request import Request, urlopen

          import websockets

          http_origin = "http://127.0.0.1:8000"
          login_request = Request(
              f"{http_origin}/api/session",
              method="POST",
              headers={
                  "Authorization": f"Bearer {os.environ['DJENIS_SMOKE_AUTH_TOKEN']}",
                  "Origin": http_origin,
              },
          )

          with urlopen(login_request, timeout=5) as response:
              if response.status != 200:
                  raise RuntimeError(f"Session login returned HTTP {response.status}")
              if json.load(response) != {"authenticated": True}:
                  raise RuntimeError("Session login returned an unexpected payload")
              set_cookie = response.headers.get("Set-Cookie")

          cookies = SimpleCookie()
          cookies.load(set_cookie or "")
          session_cookie = cookies.get("djenis_session")
          if session_cookie is None:
              raise RuntimeError("Session login did not issue the expected cookie")


          async def verify_websocket_contract() -> None:
              async with websockets.connect(
                  "ws://127.0.0.1:8000/ws",
                  origin=http_origin,
                  additional_headers={
                      "Cookie": f"djenis_session={session_cookie.value}",
                  },
                  open_timeout=5,
                  close_timeout=5,
                  proxy=None,
              ) as websocket:
                  raw_message = await asyncio.wait_for(websocket.recv(), timeout=5)
                  message = json.loads(raw_message)
                  if message.get("type") != "status":
                      raise RuntimeError(f"Unexpected WebSocket message: {message!r}")
                  payload = message.get("payload")
                  if not isinstance(payload, dict) or "agent_state" not in payload:
                      raise RuntimeError(f"Invalid WebSocket status payload: {message!r}")


          asyncio.run(verify_websocket_contract())
          print("Authenticated WebSocket smoke test passed")
          PYTHON

      - name: Scan image with Trivy
        uses: aquasecurity/trivy-action@ed142fd0673e97e23eac54620cfb913e5ce36c25 # v0.36.0
        with:
          image-ref: djenis-ai-agent:ci-${{ github.sha }}
          format: table
          exit-code: '1'
          ignore-unfixed: true
          vuln-type: os,library
          severity: CRITICAL,HIGH
